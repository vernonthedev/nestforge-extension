name: Publish to VS Code Marketplace

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: marketplace-publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      VSCE_PUBLISHER: ${{ vars.VSCE_PUBLISHER }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - name: Validate Marketplace configuration
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "Missing repository secret VSCE_PAT." >&2
            exit 1
          fi

          if [ -z "${VSCE_PUBLISHER}" ]; then
            echo "Missing repository variable VSCE_PUBLISHER." >&2
            exit 1
          fi

          if [ -z "${OVSX_PAT}" ]; then
            echo "Missing repository secret OVSX_PAT." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject Marketplace publisher
        run: npm pkg set publisher="${VSCE_PUBLISHER}"

      - name: Build extension bundle
        run: pnpm run package

      - name: Read extension version
        id: version
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        run: pnpm dlx @vscode/vsce package --packagePath "nestforge-${{ steps.version.outputs.value }}.vsix"

      - name: Publish to Visual Studio Marketplace
        run: pnpm dlx @vscode/vsce publish --packagePath "nestforge-${{ steps.version.outputs.value }}.vsix" -p "${VSCE_PAT}"

      - name: Publish to Open VSX
        run: pnpm dlx ovsx publish "nestforge-${{ steps.version.outputs.value }}.vsix" -p "${OVSX_PAT}"

      - name: Upload VSIX to GitHub release
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "nestforge-${{ steps.version.outputs.value }}.vsix" --clobber
